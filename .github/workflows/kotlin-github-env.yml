name: kotlin-github-env
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Kotlin code
        run: kotlin .github/workflows/kotlin-github-env.kts

      - name: Print HELLO env variable
        run: |
          echo "${{ env.HELLO }}"
